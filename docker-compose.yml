services:
  postgres:
    image: postgres:16
    container_name: anantbuy-postgres

    environment:
      POSTGRES_DB: anantbuy_db
      POSTGRES_USER: anantbuy
      POSTGRES_PASSWORD: AnantBuy123

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: anantbuy-api
    ports:
      - "9000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
    container_name: anantbuy-frontend
    ports:
      - "4000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
